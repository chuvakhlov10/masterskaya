<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#C70000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Мастерская" />
    <link rel="manifest" href="./manifest.json" />
    <title>Мастерская</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html { -webkit-text-size-adjust: 100%; }
      body { margin: 0; overscroll-behavior-y: contain; }
      
      /* Анимации */
      @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes flashGreen { 0% { background: rgba(46,125,50,.3); } 100% { background: transparent; } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      
      .modal-enter { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
      .fade-enter { animation: fadeIn 0.2s ease; }
      .scale-enter { animation: scaleIn 0.2s ease; }
      .flash-green { animation: flashGreen 0.8s ease; }
      .slide-down { animation: slideDown 0.2s ease; }
      
      /* Большие touch targets */
      button { min-height: 36px; touch-action: manipulation; }
      input, select, textarea { touch-action: manipulation; font-size: 16px !important; }
      
      /* Скролл */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
      
      /* Safe area для iPhone */
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
